<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tez Kino & Downloader Mini App</title>
    <script src="https://telegram.org"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root {
            --bg-color: #1c1c1e;
            --card-bg: #2c2c2e;
            --accent-color: #007aff;
            --text-color: #ffffff;
            --text-muted: #8e8e93;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .app-container {
            width: 100%;
            max-width: 450px;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .header i {
            font-size: 50px;
            color: var(--accent-color);
            background: rgba(0, 122, 255, 0.1);
            padding: 20px;
            border-radius: 50%;
            margin-bottom: 10px;
        }
        .header h1 {
            font-size: 24px;
            margin: 10px 0 5px 0;
        }
        .header p {
            color: var(--text-muted);
            font-size: 14px;
            margin: 0;
        }
        .input-group {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 5px 15px;
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            border: 1px solid #3a3a3c;
        }
        .input-group i {
            color: var(--text-muted);
            margin-right: 10px;
        }
        .input-group input {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 16px;
            width: 100%;
            padding: 12px 0;
            outline: none;
        }
        .section-title {
            font-size: 14px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 10px;
            padding-left: 5px;
            font-weight: 600;
        }
        .platform-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }
        .platform-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #3a3a3c;
            transition: all 0.2s;
        }
        .platform-card:hover {
            border-color: var(--accent-color);
        }
        .platform-card i {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .instagram i { color: #e1306c; }
        .youtube i { color: #ff0000; }
        .tiktok i { color: #ffffff; }
        .movie i { color: #ffcc00; }
        .platform-card span {
            display: block;
            font-size: 12px;
            font-weight: 500;
        }
        .btn-download {
            background-color: var(--accent-color);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
        }
        .privacy-note {
            background-color: rgba(44, 44, 46, 0.5);
            border-radius: 12px;
            padding: 15px;
            margin-top: 30px;
            display: flex;
            gap: 15px;
            align-items: start;
            border: 1px dashed #3a3a3c;
        }
        .privacy-note i {
            color: #34c759;
            font-size: 20px;
        }
        .privacy-note div h4 {
            margin: 0 0 5px 0;
            font-size: 14px;
        }
        .privacy-note div p {
            margin: 0;
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <i class="fa-solid fa-cloud-arrow-down"></i>
            <h1>Tez Kino & Downloader</h1>
            <p>Kino qidiring yoki ijtimoiy tarmoq havolasini joylang</p>
        </div>

        <div class="section-title">Qidiruv / Havola</div>
        <div class="input-group">
            <i class="fa-solid fa-link" id="input-icon"></i>
            <input type="text" id="userInput" placeholder="Kino nomi yoki video havolasi...">
        </div>

        <div class="section-title">Turini tanlang</div>
        <div class="platform-grid">
            <div class="platform-card movie" onclick="selectType('Kino')">
                <i class="fa-solid fa-film"></i>
                <span>Kino Qidirish</span>
            </div>
            <div class="platform-card instagram" onclick="selectType('Instagram')">
                <i class="fa-brands fa-instagram"></i>
                <span>Instagram</span>
            </div>
            <div class="platform-card youtube" onclick="selectType('YouTube')">
                <i class="fa-brands fa-youtube"></i>
                <span>YouTube</span>
            </div>
        </div>

        <button class="btn-download" onclick="sendDataToBot()">
            <i class="fa-solid fa-magnifying-glass"></i> Tezda Topish / Yuklash
        </button>

        <div class="privacy-note">
            <i class="fa-solid fa-shield-halved"></i>
            <div>
                <h4>Xavfsiz va Premium Xizmat</h4>
                <p>Oylik obuna bor-yo'g'i 5000 so'm. Istalgan turdagi kino va videolarni maksimal tezlikda yuklab oling.</p>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Oynani to'liq yoyish

        let selectedType = "Kino";

        function selectType(type) {
            selectedType = type;
            const icon = document.getElementById('input-icon');
            const input = document.getElementById('userInput');
            
            // Kartalarni vizual ajratish
            document.querySelectorAll('.platform-card').forEach(c => c.style.borderColor = '#3a3a3c');
            event.currentTarget.style.borderColor = '#007aff';

            if(type === 'Kino') {
                icon.className = "fa-solid fa-film";
                input.placeholder = "Kino nomini yoki tavsifini yozing...";
            } else {
                icon.className = "fa-solid fa-link";
                input.placeholder = type + " video havolasini (link) joylang...";
            }
        }

        function sendDataToBot() {
            const query = document.getElementById('userInput').value.trim();
            if (!query) {
                tg.showAlert("Iltimos, matn yoki havola kiriting!");
                return;
            }

            // Ma'lumotni JSON formatida botga yuboramiz
            const dataToSend = {
                type: selectedType,
                text: query
            };

            tg.sendData(JSON.stringify(dataToSend));
            tg.close();
        }
    </script>
</body>
</html>
