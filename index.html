<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #1e3a5f 0%, #0d1b2a 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }
        .container { max-width: 400px; margin: 0 auto; }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .header p {
            opacity: 0.7;
            font-size: 13px;
        }
        .input-group {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .input-group label {
            display: block;
            color: #333;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }
        .input-group input:focus {
            border-color: #4a90d9;
        }
        .platforms {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .platform-btn {
            flex: 1;
            padding: 16px 10px;
            border: 2px solid transparent;
            border-radius: 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            transition: all 0.2s;
            color: white;
        }
        .platform-btn:hover { transform: translateY(-2px); }
        .platform-btn.active { border-color: white; transform: scale(1.05); }
        .instagram { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .youtube { background: #ff0000; }
        .tiktok { background: #000; }

        .download-btn {
            width: 100%;
            padding: 18px;
            background: #4a90d9;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .download-btn:hover { background: #357abd; }
        .download-btn:disabled { background: #666; cursor: not-allowed; }

        .privacy {
            text-align: center;
            margin-top: 30px;
            font-size: 11px;
            opacity: 0.6;
        }

        .success-msg {
            display: none;
            background: #4ecca3;
            color: #1a1a2e;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📥 Video Downloader</h1>
            <p>Instagram, YouTube va TikTok videolarini yuklab oling</p>
        </div>

        <div class="success-msg" id="successMsg">✅ So'rov qabul qilindi! Tez orada bot javob beradi.</div>

        <div class="input-group">
            <label>Video URL ni joylashtiring</label>
            <input type="url" id="videoUrl" placeholder="https://instagram.com/reel/..." required>
        </div>

        <label style="display:block;margin-bottom:10px;font-size:13px;opacity:0.8;">Platformani tanlang:</label>
        <div class="platforms">
            <button class="platform-btn instagram" onclick="selectPlatform('instagram', this)">📷 Instagram</button>
            <button class="platform-btn youtube" onclick="selectPlatform('youtube', this)">▶️ YouTube</button>
            <button class="platform-btn tiktok" onclick="selectPlatform('tiktok', this)">🎵 TikTok</button>
        </div>

        <button class="download-btn" id="downloadBtn" onclick="downloadVideo()">⬇️ Yuklash</button>

        <div class="privacy">
            🔒 Biz sizning maxfiyligingizga hurmat qilamiz. Hech qanday video yoki shaxsiy ma'lumotlarni saqlamaymiz. Yuklab olishlaringiz xavfsiz va maxfiy.
        </div>
    </div>

    <script>
        const tg = Telegram.WebApp;
        tg.expand();

        let selectedPlatform = '';

        function selectPlatform(platform, btn) {
            selectedPlatform = platform;
            document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function downloadVideo() {
            const url = document.getElementById('videoUrl').value.trim();
            const btn = document.getElementById('downloadBtn');

            if (!url) {
                tg.showAlert('Iltimos, video URL kiriting!');
                return;
            }

            if (!selectedPlatform) {
                tg.showAlert('Iltimos, platformani tanlang!');
                return;
            }

            // URL ni botga yuborish
            const data = {
                type: 'download',
                platform: selectedPlatform,
                url: url
            };

            tg.sendData(JSON.stringify(data));

            // Foydalanuvchiga xabar
            document.getElementById('successMsg').style.display = 'block';
            document.getElementById('videoUrl').value = '';
            document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('active'));
            selectedPlatform = '';

            tg.showAlert('📥 Yuklanmoqda! Tez orada videoni olasiz.');
        }
    </script>
</body>
</html>
